services:
  haproxy:
    image: haproxy:3.2.3-alpine
    container_name: rinha-haproxy
    ports:
      - 9999:80
    volumes:
      - sockets:/sockets:rw
      - ./config/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - backend
    depends_on:
      - rinha-fire-1
      - rinha-fire-2
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: "80MB"

  rinha-fire-1:
    build:
      context: ./fire
    container_name: rinha-fire-1
    environment:
      - SOCKET=/sockets/fire1.sock
    volumes:
      - sockets:/sockets:rw
    networks:
      - backend
      - payment-processor
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: "70MB"

  rinha-fire-2:
    build:
      context: ./fire
    container_name: rinha-fire-2
    environment:
      - SOCKET=/sockets/fire2.sock
    volumes:
      - sockets:/sockets:rw
    networks:
      - backend
      - payment-processor
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: "70MB"

volumes:
  sockets:

networks:
  backend:
    name: rinha-net
    driver: bridge
  payment-processor:
    external: true
